<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moment Troc</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0C10;--s1:#13131A;--s2:#1C1C26;--bo:#252535;--bo2:#323248;--gold:#C9A84C;--gold2:#E2C46A;--gd:rgba(201,168,76,.1);--t:#EDEAEA;--t2:#8A8898;--t3:#3E3E55;--red:#F87171;--lbg:#F5F4EF;--lc:#fff;--ld:#1C1C1C;--lm:#555;--lmu:#AAA;--lb:#E8E6DF;--ls:#F0EEE8}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh}
.hide{display:none!important}
input{outline:none;font-family:inherit}
button{font-family:inherit;cursor:pointer}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* KEY SCREEN */
#ks{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.kc{background:var(--s1);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:48px 36px;max-width:400px;width:100%;text-align:center}
.kl{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--t)}.kl em{color:var(--gold);font-style:normal}
.ks2{font-size:10px;letter-spacing:4px;color:var(--t2);margin-bottom:32px}
.klbl{font-size:11px;color:var(--t2);text-align:left;margin-bottom:8px}
.ki{width:100%;background:var(--bg);border:1.5px solid var(--bo2);border-radius:3px;padding:13px 15px;color:var(--t);margin-bottom:10px;font-size:14px}
.ki:focus{border-color:var(--gold)}
.gbtn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:3px;padding:14px;font-weight:700;font-size:14px}
.kerr{color:var(--red);font-size:12px;margin-top:10px}
/* ENTREPRENEUR */
#ve{background:var(--bg);min-height:100vh;padding:32px 16px}
.ew{max-width:660px;margin:auto}
.ehdr{display:flex;gap:12px;align-items:center;margin-bottom:24px}
.eico{width:40px;height:40px;border-radius:50%;background:var(--gd);border:1.5px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:16px}
.etit{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--t)}
.esub{font-size:10px;color:var(--t2)}
.tabs{display:flex;gap:2px;background:var(--s2);border-radius:8px;padding:3px;width:fit-content;margin-bottom:18px}
.tab{padding:7px 18px;border-radius:6px;font-size:12px;font-weight:600;color:var(--t2);background:none;border:none}
.tab.on{background:var(--s1);color:var(--t)}
.card{background:var(--s1);border:1px solid var(--bo);border-radius:10px;padding:20px;margin-bottom:12px}
.ctit{font-size:10px;letter-spacing:.18em;color:var(--gold);margin-bottom:14px;font-weight:600}
.fg{margin-bottom:10px}
.fl{font-size:10px;color:var(--t3);display:block;margin-bottom:5px}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--bo2);border-radius:6px;padding:9px 12px;color:var(--t);font-size:13px}
.fi:focus{border-color:var(--gold)}
.sbtn{background:var(--gd);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:7px 14px;font-size:12px;color:var(--gold);width:auto}
.lbox{background:var(--bg);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:16px;margin-top:12px;display:none}
.lbox.on{display:block}
.lval{font-size:11px;color:var(--t2);word-break:break-all;padding:8px;background:var(--s1);border-radius:6px;margin-bottom:8px;font-family:monospace}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--s1);border:1px solid var(--bo);border-radius:8px;padding:12px}
.stn{font-size:24px;font-weight:700;color:var(--t)}
.stl{font-size:10px;color:var(--t2)}
.tw{background:var(--s1);border:1px solid var(--bo);border-radius:10px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:9px 12px;text-align:left;font-size:11px;color:var(--t2);border-bottom:1px solid #111118}
.bdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;border:1px solid rgba(201,168,76,.4);color:var(--gold)}
/* PROSPECT */
#vp{background:var(--lbg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.pc{background:var(--lc);border-radius:16px;max-width:480px;width:100%;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,.08)}
.prog{height:3px;background:var(--lb)}.progf{height:100%;background:var(--ld);width:0%;transition:width .4s}
.scr{display:none}.scr.on{display:block;animation:up .3s}
/* intro */
.intro{padding:40px 32px 34px}
.itag{font-size:10px;letter-spacing:.2em;color:var(--lmu);margin-bottom:14px}
.itit{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--ld);margin-bottom:10px}
.idesc{font-size:13px;color:var(--lm);margin-bottom:20px}
.ibox{background:var(--ls);border-radius:8px;padding:12px 16px;margin-bottom:20px}
.iblbl{font-size:10px;letter-spacing:.16em;color:var(--lmu);margin-bottom:8px}
.ibrow{display:flex;gap:8px;font-size:13px;color:var(--lm);margin-bottom:4px}
.dot{width:5px;height:5px;background:var(--gold);border-radius:50%;margin-top:6px;flex-shrink:0}
.pbtn{display:block;width:100%;background:var(--ld);color:#fff;border:none;border-radius:8px;padding:14px;font-weight:600;font-size:13px;text-align:center}
.pnote{font-size:11px;color:var(--lmu);text-align:center;margin-top:8px}
/* question */
.qb{padding:26px 32px 30px}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.qnum{font-size:10px;color:var(--lmu)}
.qdots{display:flex;gap:4px}
.qd{width:6px;height:6px;border-radius:50%;background:var(--lb)}
.qd.on{background:var(--ld)}
.qtxt{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--ld);margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1.5px solid var(--lb);border-radius:8px;cursor:pointer}
.opt.on{border-color:var(--ld);background:var(--ls)}
.otr{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--lb);flex-shrink:0;margin-top:1px;position:relative}
.opt.on .otr{background:var(--ld);border-color:var(--ld)}
.opt.on .otr::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.otxt{font-size:13px;color:var(--ld)}
.nav{display:flex;justify-content:space-between;margin-top:18px}
.bk{background:none;border:1.5px solid var(--lb);border-radius:7px;padding:8px 14px;font-size:12px;color:var(--lmu)}
.nx{background:var(--ld);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-weight:600;font-size:13px;opacity:.25;pointer-events:none}
.nx.go{opacity:1;pointer-events:auto}
/* email */
.eb{padding:32px}
.eico2{font-size:32px;margin-bottom:12px}
.etit2{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--ld);margin-bottom:6px}
.esub2{font-size:13px;color:var(--lm);margin-bottom:18px}
.pf{width:100%;background:var(--ls);border:1.5px solid var(--lb);border-radius:8px;padding:11px 13px;font-size:14px;margin-bottom:8px;font-family:inherit}
.pf:focus{border-color:var(--ld);background:#fff;outline:none}
.prv{font-size:11px;color:var(--lmu);text-align:center;margin-top:6px}
/* confirm */
.conf{padding:44px 32px;text-align:center}
.cico{font-size:48px;margin-bottom:14px}
.ctit2{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--ld);margin-bottom:8px}
.csub{font-size:13px;color:var(--lm);margin-bottom:24px}
.cnote{font-size:11px;color:var(--lmu);margin-top:10px}
@media(max-width:500px){.qb,.intro,.eb,.conf{padding-left:18px;padding-right:18px}}
</style>
</head>
<body>

<!-- ÉCRAN CLÉ -->
<div id="ks">
  <div class="kc">
    <div class="kl">Moment <em>Troc</em></div>
    <div class="ks2">PROFILAGE ACHETEUR</div>
    <div class="klbl">Clé d'activation</div>
    <input type="text" id="ki" class="ki" placeholder="Ex: MKB2000-2022A">
    <button class="gbtn" id="ba">Activer →</button>
    <div class="kerr" id="ke"></div>
  </div>
</div>

<!-- CONTENU PRINCIPAL -->
<div id="main" class="hide"></div>

<script>
(function(){
const KEYS=["MKB2000-2022A","MT-A1X9-KZ72","MT-B3W5-QP48","MT-C7R2-NL91","MT-D4M8-VS63","MT-E6J1-HT85","MT-F2K7-XB34","MT-G9P3-YC56","MT-H5N6-ZD17","MT-I8L4-WE29","MT-J1Q9-RF43","MT-K3S7-UG68","MT-L6T2-MH15","MT-M4V8-JI92","MT-N7B1-OK37","MT-O2C5-PL84","MT-P9D3-QM56","MT-Q5F6-RN71","MT-R1G4-SO29","MT-S8H7-TK43"];

const Q=[
{q:"Quand tu découvres quelque chose qui pourrait t'aider, tu fais quoi en premier ?",o:[
{t:"Je cherche des retours de gens qui l'ont testé.",s:"a"},
{t:"Je calcule si l'investissement vaut le coup.",s:"b"},
{t:"Je compare les prix pour ne pas payer trop cher.",s:"c"},
{t:"Je regarde qui l'utilise et si ça correspond à mon image.",s:"d"},
{t:"Je vérifie si c'est adapté à ma situation.",s:"e"},
{t:"Je lis les conditions et cherche ce qui pourrait ne pas marcher.",s:"f"}]},
{q:"Quel est ton plus grand défi ?",o:[
{t:"Je ne sais pas par où commencer.",s:"a"},
{t:"Les résultats ne sont pas proportionnels.",s:"b"},
{t:"Je dépense pour des promesses non tenues.",s:"c"},
{t:"J'ai du mal à me différencier.",s:"d"},
{t:"Les solutions sont trop génériques.",s:"e"},
{t:"J'ai du mal à refaire confiance.",s:"f"}]},
{q:"Entre deux contenus gratuits, lequel tu ouvres ?",o:[
{t:"Celui avec un plan clair.",s:"a"},
{t:"Celui avec des résultats chiffrés.",s:"b"},
{t:"Celui qui compare les options.",s:"c"},
{t:"Celui bien présenté.",s:"d"},
{t:"Celui qui parle de ma situation.",s:"e"},
{t:"Celui qui explique ce qui ne marche pas.",s:"f"}]},
{q:"Quand tu es satisfait d'un achat, tu dis ?",o:[
{t:"C'était simple et ça a marché.",s:"a"},
{t:"C'est rentable.",s:"b"},
{t:"Excellent rapport qualité-prix.",s:"c"},
{t:"Ça m'a aidé à me positionner.",s:"d"},
{t:"C'était fait pour moi.",s:"e"},
{t:"Pas de mauvaise surprise.",s:"f"}]},
{q:"Face à une nouvelle opportunité, qu'est-ce qui peut te bloquer ?",o:[
{t:"Manque d'accompagnement.",s:"a"},
{t:"Doute sur le ROI.",s:"b"},
{t:"Prix trop élevé.",s:"c"},
{t:"Image pas adaptée.",s:"d"},
{t:"Pas personnalisé.",s:"e"},
{t:"Peur d'être déçu.",s:"f"}]},
{q:"Comment tu te sens quand ça ne marche pas ?",o:[
{t:"Perdu, j'aurais eu besoin d'un guide.",s:"a"},
{t:"Frustré, j'aurais dû mieux évaluer.",s:"b"},
{t:"En colère, argent gaspillé.",s:"c"},
{t:"Gêné, je me suis laissé influencer.",s:"d"},
{t:"Déçu, ce n'était pas pour moi.",s:"e"},
{t:"Méfiant, je sentais un problème.",s:"f"}]},
{q:"Quel message te donne envie d'agir ?",o:[
{t:"Suis ces 5 étapes.",s:"a"},
{t:"Multiplie tes résultats.",s:"b"},
{t:"Meilleur rapport qualité-prix.",s:"c"},
{t:"Rejoins les entrepreneurs qui ont réussi.",s:"d"},
{t:"Conçu pour toi.",s:"e"},
{t:"Aucune surprise, tout est clair.",s:"f"}]}
];

const MEF=[{t:"Faible – je fais confiance"},{t:"Modéré – besoin de preuves"},{t:"Élevé – garanties nécessaires"},{t:"Très élevé – déjà déçu"}];
const PROFILS={a:"Automatiseur",b:"Optimiseur Valeur",c:"Optimiseur Prix",d:"Élévateur",e:"Libérateur",f:"Protecteur"};

let scores={a:0,b:0,c:0,d:0,e:0,f:0};
let reponses={};
let mefiance="";

function $(id){return document.getElementById(id)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[m])}
function gC(){try{return JSON.parse(localStorage.getItem("mt_c")||"{}")}catch(e){return{}}}
function gL(){try{return JSON.parse(localStorage.getItem("mt_l")||"[]")}catch(e){return[]}}
function sL(l){localStorage.setItem("mt_l",JSON.stringify(l))}

// Helper copie presse-papier avec fallback
function copyToClipboard(text, onSuccess) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
  } else {
    fallbackCopy(text, onSuccess);
  }
}
function fallbackCopy(text, onSuccess) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch (e) {
    alert('Copie impossible, copiez manuellement.');
  }
  document.body.removeChild(textarea);
}

// ACTIVATION
$("ba").onclick=()=>{
  let k=$("ki").value.trim().toUpperCase(),err=$("ke");
  err.textContent="";
  if(!k){err.textContent="Entrez une clé.";return}
  if(KEYS.includes(k)){
    $("ks").classList.add("hide");
    $("main").classList.remove("hide");
    location.search.includes("prospect")?renderP():renderE();
  }else err.textContent="Clé invalide.";
};

// ESPACE ENTREPRENEUR
function renderE(){
  let c=gC();
  $("main").innerHTML=`<div id="ve"><div class="ew">
  <div class="ehdr"><div class="eico">MT</div><div><div class="etit">Moment Troc</div><div class="esub">Espace entrepreneur</div></div></div>
  <div class="tabs"><button class="tab on" id="t1">⚙️ Config</button><button class="tab" id="t2">📊 Leads</button></div>
  <div id="tcfg">
    <div class="card"><div class="ctit">CONFIGURATION</div>
      <div class="fg"><label class="fl">Titre de l'offre</label><input class="fi" id="ct" value="${esc(c.titre||"")}"></div>
      <div class="fg"><label class="fl">Lead magnet</label><input class="fi" id="cc" value="${esc(c.cadeau||"")}"></div>
      <div class="fg"><label class="fl">Lien lead magnet</label><input class="fi" id="cl" value="${esc(c.lien||"")}"></div>
      <div class="fg"><label class="fl">Niche / produit</label><input class="fi" id="cn" value="${esc(c.niche||"")}"></div>
      <div class="fg"><label class="fl">Endpoint Formspree</label><input class="fi" id="cf" placeholder="https://formspree.io/f/xxxx" value="${esc(c.formspree||"")}"></div>
    </div>
    <button class="gbtn" id="sv" style="max-width:280px">💾 Sauvegarder et générer lien</button>
    <div class="lbox" id="lbox"><div class="lval" id="lval"></div><button class="sbtn" id="lcp">📋 Copier</button></div>
  </div>
  <div id="tleads" class="hide">
    <div class="stats" id="sts"></div>
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="ctit" style="margin:0">LEADS</div><button class="sbtn" id="exp">⬇️ CSV</button>
    </div>
    <div class="tw"><table><thead><tr><th>Prénom</th><th>Email</th><th>Profil</th><th>Méfiance</th><th>Date</th></tr></thead><tbody id="etb"></tbody></table></div>
  </div>
  </div></div>`;

  $("t1").onclick=()=>tab("cfg");
  $("t2").onclick=()=>tab("leads");
  $("sv").onclick=()=>{
    let cfg={titre:$("ct").value,cadeau:$("cc").value,lien:$("cl").value,niche:$("cn").value,formspree:$("cf").value};
    localStorage.setItem("mt_c",JSON.stringify(cfg));
    let url=location.href.split("?")[0]+"?prospect";
    $("lval").textContent=url;
    $("lbox").classList.add("on");
    $("lcp").onclick=()=>{
      copyToClipboard(url, () => {
        $("lcp").textContent="✓ Copié!";
        setTimeout(()=>$("lcp").textContent="📋 Copier",2000);
      });
    };
  };
  $("exp").onclick=exportCSV;
  tab("cfg");
}

function tab(t){
  $("t1").classList.toggle("on",t=="cfg");
  $("t2").classList.toggle("on",t=="leads");
  $("tcfg").classList.toggle("hide",t!="cfg");
  $("tleads").classList.toggle("hide",t!="leads");
  if(t=="leads")loadLeads();
}

function loadLeads(){
  let leads=gL(),tb=$("etb"),st=$("sts");
  if(!leads.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px">Aucun lead</td></tr>';st.innerHTML="";return}
  let s={};tb.innerHTML="";
  leads.forEach(l=>{
    let p=l.profil||"?";s[p]=(s[p]||0)+1;
    tb.innerHTML+=`<tr><td>${esc(l.prenom)}</td><td>${esc(l.email)}</td><td><span class="bdg">${esc(p)}</span></td><td>${esc(l.mefiance)}</td><td>${new Date(l.date).toLocaleDateString()}</td></tr>`;
  });
  let total = leads.length;
  let statsHtml = `<div class="stat"><div class="stn">${total}</div><div class="stl">Total</div></div>`;
  statsHtml += Object.entries(s).map(([k,v])=>`<div class="stat"><div class="stn">${v}</div><div class="stl">${k}</div></div>`).join("");
  st.innerHTML = statsHtml;
}

function exportCSV(){
  let leads=gL();if(!leads.length){alert("Aucun lead");return}
  let csv="Prénom,Email,Profil,Méfiance,Date\n";
  leads.forEach(l=>csv+=`"${l.prenom}","${l.email}","${l.profil}","${l.mefiance}","${l.date}"\n`);
  let a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"}));a.download="leads-momenttroc.csv";a.click();
}

// FORMULAIRE PROSPECT
function renderP(){
  // Réinitialisation des scores et réponses
  scores = {a:0,b:0,c:0,d:0,e:0,f:0};
  reponses = {};
  mefiance = "";

  let c=gC();
  let titre=c.titre||"Réponds à quelques questions";
  let cadeau=c.cadeau||"ton lead magnet";
  let dots=Array.from({length:8},()=>`<div class="qd"></div>`).join("");

  let qHtml="";
  for(let i=0;i<7;i++){
    let q=Q[i];
    let opts=q.o.map(o=>`<div class="opt" data-q="${i}" data-s="${o.s}"><div class="otr"></div><div class="otxt">${esc(o.t)}</div></div>`).join("");
    qHtml+=`<div class="scr" id="q${i}"><div class="qb">
      <div class="qmeta"><span class="qnum">Question ${i+1} / 8</span><div class="qdots">${dots}</div></div>
      <div class="qtxt">${esc(q.q)}</div>
      <div class="opts">${opts}</div>
      <div class="nav">
        <button class="bk" data-back="${i}">${i===0?"Annuler":"← Retour"}</button>
        <button class="nx" id="nx${i}" data-fwd="${i}">Suivant →</button>
      </div>
    </div></div>`;
  }

  let mefOpts=MEF.map(o=>`<div class="opt" data-mef="1" data-t="${esc(o.t)}"><div class="otr"></div><div class="otxt">${esc(o.t)}</div></div>`).join("");

  $("main").innerHTML=`<div id="vp"><div class="pc">
  <div class="prog"><div class="progf" id="pf"></div></div>
  <div class="scr on" id="sintro"><div class="intro">
    <div class="itag">ACCÈS GRATUIT</div>
    <div class="itit">${esc(titre)}</div>
    <div class="idesc">8 questions rapides pour obtenir ton accès personnalisé.</div>
    <div class="ibox"><div class="iblbl">CE QUE TU REÇOIS</div>
      <div class="ibrow"><div class="dot"></div><strong>${esc(cadeau)}</strong></div>
    </div>
    <button class="pbtn" id="start">Commencer →</button>
    <div class="pnote">Gratuit · 2 min</div>
  </div></div>
  ${qHtml}
  <div class="scr" id="smef"><div class="qb">
    <div class="qmeta"><span class="qnum">Dernière question</span><div class="qdots">${dots}</div></div>
    <div class="qtxt">Quel niveau de méfiance as-tu face aux offres en ligne ?</div>
    <div class="opts">${mefOpts}</div>
    <div class="nav">
      <button class="bk" id="bkmef">← Retour</button>
      <button class="nx" id="nxmef">Continuer →</button>
    </div>
  </div></div>
  <div class="scr" id="semail"><div class="eb">
    <div class="eico2">📧</div>
    <div class="etit2">Dernière étape</div>
    <div class="esub2">Ton prénom et email pour recevoir ton accès.</div>
    <input class="pf" id="pp" placeholder="Prénom">
    <input class="pf" id="pe" placeholder="Email">
    <button class="pbtn" id="sub">Recevoir l'accès →</button>
    <div class="prv">🔒 Confidentiel</div>
  </div></div>
  <div class="scr" id="sconfirm"><div class="conf">
    <div class="cico">✅</div>
    <div class="ctit2">C'est fait !</div>
    <div class="csub">Ton accès est prêt ci-dessous.</div>
    <a href="#" class="pbtn" id="clien">Accéder →</a>
    <div class="cnote">Vérifie aussi tes emails.</div>
  </div></div>
  </div></div>`;

  function show(id){document.querySelectorAll(".scr").forEach(s=>s.classList.remove("on"));$(id).classList.add("on")}
  function prog(n){$("pf").style.width=(n/8*100)+"%"}
  function updDots(n){document.querySelectorAll(".qd").forEach((d,i)=>d.classList.toggle("on",i<n))}

  $("start").onclick=()=>{show("q0");prog(1);updDots(1)};

  // Navigation questions
  document.querySelectorAll(".opt[data-q]").forEach(el=>{
    el.onclick=function(){
      let qi=this.dataset.q,s=this.dataset.s;
      document.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(o=>o.classList.remove("on"));
      this.classList.add("on");
      reponses[qi]=s;
      // Recalculer les scores pour éviter double comptage si changement de réponse
      scores={a:0,b:0,c:0,d:0,e:0,f:0};
      for(let r in reponses) scores[reponses[r]]++;
      $("nx"+qi).classList.add("go");
    }
  });

  document.querySelectorAll(".bk[data-back]").forEach(el=>{
    el.onclick=function(){
      let i=parseInt(this.dataset.back);
      if(i===0){
        show("sintro");
        prog(0);
        updDots(0);
      } else {
        show("q"+(i-1));
        prog(i);
        updDots(i);
      }
    }
  });

  document.querySelectorAll(".nx[data-fwd]").forEach(el=>{
    el.onclick=function(){
      let i=parseInt(this.dataset.fwd);
      if(reponses[i]===undefined){alert("Réponds à la question.");return}
      let n=i+1;
      if(n>=7){show("smef");prog(7.5);updDots(7);}
      else{show("q"+n);prog(n+1);updDots(n+1);}
    }
  });

  // Méfiance
  document.querySelectorAll(".opt[data-mef]").forEach(el=>{
    el.onclick=function(){
      document.querySelectorAll(".opt[data-mef]").forEach(o=>o.classList.remove("on"));
      this.classList.add("on");mefiance=this.dataset.t;
      $("nxmef").classList.add("go");
    }
  });
  $("bkmef").onclick=()=>{show("q6");prog(7);updDots(7)};
  $("nxmef").onclick=()=>{if(!mefiance){alert("Sélectionne une réponse.");return}show("semail");prog(8);updDots(8)};

  // Soumission
  $("sub").onclick=async function(){
    if (this.disabled) return;
    let prenom=$("pp").value.trim(),email=$("pe").value.trim();
    if(!prenom||!email){alert("Remplis les deux champs.");return}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert("Adresse email invalide.");return}

    this.disabled = true;
    this.textContent = "Envoi en cours...";

    let top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
    let profil=PROFILS[top]||"Inconnu";
    let lead={prenom,email,profil,mefiance,date:new Date().toISOString()};
    let leads=gL();leads.push(lead);sL(leads);
    let c2=gC();
    if(c2.formspree && c2.formspree.startsWith('https://formspree.io/')){
      try{await fetch(c2.formspree,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(lead)})}catch(e){console.warn(e)}
    }
    if(c2.lien){$("clien").href=c2.lien}
    show("sconfirm");prog(8);

    // Réactiver après coup (si jamais l'utilisateur revient en arrière)
    this.disabled = false;
    this.textContent = "Recevoir l'accès →";
  };
}

// Routing
if(location.search.includes("prospect")){
  $("ks").querySelector(".kl").innerHTML='Moment <em>Troc</em>';
  $("ks").querySelector(".ks2").textContent="ACCÈS GRATUIT";
  // On laisse l'écran d'activation visible mais on peut aussi auto-activer avec une clé par défaut ?
  // Ici on garde le comportement existant : l'utilisateur doit entrer une clé.
}

})();
</script>
</body>
