<script>

];

// ========== GÉNÉRATION D'UNE EMPREINTE (fingerprint) ==========
function getDeviceFingerprint() {
  const nav = navigator;
  const screen = window.screen;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 200; canvas.height = 50;
  ctx.fillStyle = "#f60"; ctx.fillRect(0,0,200,50);
  ctx.font = "14px Arial"; ctx.fillStyle = "#fff"; ctx.fillText("MT", 10, 30);
  const canvasData = canvas.toDataURL();
  const fingerprint = [
    nav.userAgent,
    nav.language,
    screen.width + "x" + screen.height + "x" + screen.colorDepth,
    new Date().getTimezoneOffset(),
    canvasData.substring(0, 100),
    !!nav.hardwareConcurrency ? nav.hardwareConcurrency : 0,
    !!nav.deviceMemory ? nav.deviceMemory : 0
  ].join("|");
  // hash simple
  let hash = 0;
  for(let i=0; i<fingerprint.length; i++) {
    hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
    hash |= 0;
  }
  return hash.toString();
}

// ========== VÉRIFICATION CLÉ UNIQUE PAR APPAREIL ==========
function checkKeyUniqueness(key) {
  const fp = getDeviceFingerprint();
  const stored = localStorage.getItem("mt_key_registry");
  let registry = stored ? JSON.parse(stored) : {};
  // Si la clé est déjà enregistrée avec une empreinte différente -> refus
  if(registry[key] && registry[key] !== fp) {
    return { ok: false, reason: "Cette clé a déjà été utilisée sur un autre appareil." };
  }
  // Si la clé n'existe pas ou est déjà associée à cette empreinte -> ok
  if(!registry[key]) {
    registry[key] = fp;
    localStorage.setItem("mt_key_registry", JSON.stringify(registry));
  }
  return { ok: true };
}

// ========== RESTE DU CODE (gestion leads, config, etc.) ==========
const urlParams = new URLSearchParams(window.location.search);
const isProspect = urlParams.has('prospect');

let currentConfig = { nom: "", cadeau: "", titre: "", lien: "", email: "" };

function loadConfig() {
  const saved = localStorage.getItem("mt_config");
  if(saved) {
    try {
      currentConfig = JSON.parse(saved);
      if(document.getElementById("cnom")) document.getElementById("cnom").value = currentConfig.nom || "";
      if(document.getElementById("ccadeau")) document.getElementById("ccadeau").value = currentConfig.cadeau || "";
      if(document.getElementById("ctitre")) document.getElementById("ctitre").value = currentConfig.titre || "";
      if(document.getElementById("clien")) document.getElementById("clien").value = currentConfig.lien || "";
      if(document.getElementById("cemail")) document.getElementById("cemail").value = currentConfig.email || "";
    } catch(e) {}
  }
}

function saveConfigToLocal() {
  currentConfig.nom = document.getElementById("cnom").value;
  currentConfig.cadeau = document.getElementById("ccadeau").value;
  currentConfig.titre = document.getElementById("ctitre").value;
  currentConfig.lien = document.getElementById("clien").value;
  currentConfig.email = document.getElementById("cemail").value;
  localStorage.setItem("mt_config", JSON.stringify(currentConfig));
}

function sauvegarder() {
  saveConfigToLocal();
  const baseUrl = window.location.href.split('?')[0];
  const prospectUrl = baseUrl + "?prospect";
  document.getElementById("lval").innerText = prospectUrl;
  document.getElementById("lbox").classList.add("on");
}

function copierLien() {
  const lien = document.getElementById("lval").innerText;
  navigator.clipboard.writeText(lien);
  alert("Lien copié !");
}

function eTab(tab, btn) {
  const btns = document.querySelectorAll(".etab");
  btns.forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  if(tab === "cfg") {
    document.getElementById("tcfg").style.display = "block";
    document.getElementById("tleads").style.display = "none";
  } else {
    document.getElementById("tcfg").style.display = "none";
    document.getElementById("tleads").style.display = "block";
    chargerLeads();
  }
}

function getLeads() {
  const leads = localStorage.getItem("mt_leads");
  return leads ? JSON.parse(leads) : [];
}

function saveLeads(leads) {
  localStorage.setItem("mt_leads", JSON.stringify(leads));
}

function chargerLeads() {
  const leads = getLeads();
  const tbody = document.getElementById("etbody");
  if(!tbody) return;
  tbody.innerHTML = "";
  const stats = { auto:0, optiV:0, optiP:0, elev:0, lib:0, prot:0 };
  leads.forEach(lead => {
    const profile = lead.profile || "Non défini";
    if(profile === "Autonome") stats.auto++;
    else if(profile === "Optimiseur Valeur") stats.optiV++;
    else if(profile === "Optimiseur Prix") stats.optiP++;
    else if(profile === "Élévation Sociale") stats.elev++;
    else if(profile === "Liberté") stats.lib++;
    else if(profile === "Protection") stats.prot++;
    const row = `<tr><td>${escapeHtml(lead.prenom || '')}</td><td>${escapeHtml(lead.email || '')}</td><td>${escapeHtml(profile)}</td><td>${escapeHtml(lead.mefiance || '')}</td><td>${escapeHtml(lead.pays || '')}</td><td>${new Date(lead.date).toLocaleString()}</td></tr>`;
    tbody.innerHTML += row;
  });
  const statsDiv = document.getElementById("estats");
  if(statsDiv) {
    statsDiv.innerHTML = `
      <div class="estat"><div class="estatn">${stats.auto}</div><div class="estatl">Autonome</div></div>
      <div class="estat"><div class="estatn">${stats.optiV}</div><div class="estatl">Optim. Valeur</div></div>
      <div class="estat"><div class="estatn">${stats.optiP}</div><div class="estatl">Optim. Prix</div></div>
      <div class="estat"><div class="estatn">${stats.elev}</div><div class="estatl">Élévation sociale</div></div>
      <div class="estat"><div class="estatn">${stats.lib}</div><div class="estatl">Liberté</div></div>
      <div class="estat"><div class="estatn">${stats.prot}</div><div class="estatl">Protection</div></div>
    `;
  }
}

function exportCSV() {
  const leads = getLeads();
  let csv = "Prénom,Email,Profil,Méfiance,Pays,Date\n";
  leads.forEach(l => {
    csv += `"${l.prenom || ''}","${l.email || ''}","${l.profile || ''}","${l.mefiance || ''}","${l.pays || ''}","${l.date}"\n`;
  });
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "leads.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    {t:"Les promesses sans preuves concrètes.",s:{optiV:3}},
    {t:"Les prix gonflés sans justification.",s:{optiP:3}},
    {t:"Les offres qui ne reflètent pas un vrai positionnement.",s:{elev:3}},
    {t:"Les solutions trop génériques qui ne correspondent pas à mon cas.",s:{lib:3}},
    {t:"Les engagements flous et les risques cachés.",s:{prot:3}}
  ]}
];

let pAnswers = [];
let pCurrent = 0;
let pScores = { auto:0, optiV:0, optiP:0, elev:0, lib:0, prot:0 };
let pPrenom = "", pEmail = "";

function pStart() {
  pAnswers = [];
  pCurrent = 0;
  pScores = { auto:0, optiV:0, optiP:0, elev:0, lib:0, prot:0 };
  showScreen("psquestions");
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[pCurrent];
  document.getElementById("pqtxt").innerText = q.q;
  document.getElementById("pqnum").innerText = `Question ${pCurrent+1}/${QUESTIONS.length}`;
  const dotsDiv = document.getElementById("pqdots");
  dotsDiv.innerHTML = "";
  for(let i=0; i<QUESTIONS.length; i++) {
    const dot = document.createElement("div");
    dot.className = "pqdot" + (i < pCurrent ? " done" : "");
    dotsDiv.appendChild(dot);
  }
  const optsDiv = document.getElementById("popts");
  optsDiv.innerHTML = "";
  q.opts.forEach((opt, idx) => {
    const isSelected = (pAnswers[pCurrent] === idx);
    const div = document.createElement("div");
    div.className = "popt" + (isSelected ? " on" : "");
    div.innerHTML = `<div class="popto"></div><div class="poptt">${escapeHtml(opt.t)}</div>`;
    div.onclick = () => selectOption(idx);
    optsDiv.appendChild(div);
  });
  const nextBtn = document.getElementById("pnx");
  if(pAnswers[pCurrent] !== undefined) nextBtn.classList.add("go");
  else nextBtn.classList.remove("go");
}

function selectOption(idx) {
  pAnswers[pCurrent] = idx;
  renderQuestion();
}

function pNext() {
  if(pAnswers[pCurrent] === undefined) return;
  const selected = QUESTIONS[pCurrent].opts[pAnswers[pCurrent]].s;
  for(let [k,v] of Object.entries(selected)) {
    pScores[k] = (pScores[k] || 0) + v;
  }
  if(pCurrent + 1 < QUESTIONS.length) {
    pCurrent++;
    renderQuestion();
  } else {
    showScreen("psemail");
  }
}

function pPrev() {
  if(pCurrent > 0) {
    if(pAnswers[pCurrent-1] !== undefined) {
      const prevScores = QUESTIONS[pCurrent-1].opts[pAnswers[pCurrent-1]].s;
      for(let [k,v] of Object.entries(prevScores)) {
        pScores[k] -= v;
      }
    }
    pCurrent--;
    renderQuestion();
  }
}

function showScreen(screenId) {
  document.querySelectorAll(".pscreen").forEach(s => s.classList.remove("on"));
  document.getElementById(screenId).classList.add("on");
  const progress = (() => {
    if(screenId === "psquestions") return (pCurrent / QUESTIONS.length)*100;
    if(screenId === "psemail") return 100;
    if(screenId === "psconfirm") return 100;
    return 0;
  })();
  document.getElementById("pprogf").style.width = progress + "%";
}

function getDominantProfile(scores) {
  let maxKey = "auto", maxVal = 0;
  for(let [k,v] of Object.entries(scores)) {
    if(v > maxVal) { maxVal = v; maxKey = k; }
  }
  const map = {
    auto: "Autonome",
    optiV: "Optimiseur Valeur",
    optiP: "Optimiseur Prix",
    elev: "Élévation Sociale",
    lib: "Liberté",
    prot: "Protection"
  };
  return map[maxKey] || "Non défini";
}

async function pSoumettre(event) {
  if(event) event.preventDefault();
  const prenom = document.getElementById("pprenom").value.trim();
  const email = document.getElementById("pemail").value.trim();
  if(!prenom || !email) {
    alert("Merci de renseigner ton prénom et ton email.");
    return;
  }
  pPrenom = prenom;
  pEmail = email;
  const profile = getDominantProfile(pScores);
  let mefiance = "faible";
  if(pScores.prot >= 9) mefiance = "élevée";
  else if(pScores.prot >= 5) mefiance = "moyenne";
  const pays = "FR";
  const lead = { prenom, email, profile, mefiance, pays, date: new Date().toISOString(), scores: pScores };
  const leads = getLeads();
  leads.push(lead);
  saveLeads(leads);
  const config = JSON.parse(localStorage.getItem("mt_config") || "{}");
  const adminEmail = config.email;
  if(adminEmail && adminEmail.includes("@")) {
    try {
      await fetch("https://formspree.io/f/mlgogblo", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ ...lead, _replyto: adminEmail, message: `Nouveau lead : ${profile}, méfiance ${mefiance}` })
      });
    } catch(e) { console.warn(e); }
  }
  const cadeau = config.cadeau || "ton accès gratuit";
  const lien = config.lien || "#";
  document.getElementById("pctitle").innerText = `Merci ${prenom} !`;
  document.getElementById("pcsub").innerHTML = `Tu vas recevoir ${cadeau} par email. Clique ci-dessous pour y accéder immédiatement.`;
  const btn = document.getElementById("pclien");
  btn.href = lien;
  btn.innerText = `Accéder à ${cadeau} →`;
  showScreen("psconfirm");
  if(document.getElementById("tleads") && document.getElementById("tleads").style.display !== "none") chargerLeads();
}

// ========== ACTIVATION ==========
function activer() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) { document.getElementById('key-error').innerText = 'Veuillez entrer une clé.'; return; }
  if (!VALID_KEYS.includes(key)) {
    document.getElementById('key-error').innerText = 'Clé invalide.';
    return;
  }
  const uniqueness = checkKeyUniqueness(key);
  if (!uniqueness.ok) {
    document.getElementById('key-error').innerText = uniqueness.reason;
    return;
  }
  document.getElementById('key-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  initOutil(false);
}

function initOutil(isProspectMode) {
  const toolHTML = `
    <div id="vue-e" style="display:${isProspectMode ? 'none' : 'flex'}">
      <div class="ew">
        <div class="ehdr"><div class="elogo">MT</div><div><div class="etitle">Moment Troc</div><div class="esub">Espace entrepreneur</div></div></div>
        <div class="etabs"><button class="etab on" onclick="eTab('cfg',this)">⚙ Configuration</button><button class="etab" onclick="eTab('leads',this);chargerLeads()">📋 Mes leads</button></div>
        <div id="tcfg">
          <div class="ecard"><div class="ecttl">Configure ton formulaire</div>
            <div class="eg2">
              <div class="efg"><label class="efl">Nom du formulaire</label><input class="efi" id="cnom" type="text" placeholder="Ex : Accès ebook"/><div class="efh">Pour identifier tes formulaires.</div></div>
              <div class="efg"><label class="efl">Ce que tu offres</label><input class="efi" id="ccadeau" type="text" placeholder="Ex : l'ebook gratuit"/><div class="efh">Ce que reçoit le prospect.</div></div>
              <div class="efg egfull"><label class="efl">Titre affiché au prospect</label><input class="efi" id="ctitre" type="text" placeholder="Ex : Réponds à 3 questions..."/></div>
              <div class="efg egfull"><label class="efl">Lien vers ton contenu gratuit</label><input class="efi" id="clien" type="url" placeholder="https://..."/><div class="efh">Où arrive le prospect après soumission.</div></div>
              <div class="efg egfull"><label class="efl">Ton email (pour recevoir les leads)</label><input class="efi" id="cemail" type="email" placeholder="ton@email.com"/><div class="efh">Reçois chaque lead par email.</div></div>
            </div>
          </div>
          <button class="ebtn" onclick="sauvegarder()">Sauvegarder et obtenir mon lien →</button>
          <div class="lbox" id="lbox"><div class="llbl">🔗 Ton lien prospect — prêt à partager</div><div class="lval" id="lval"></div><button class="lcopy" id="lcbtn" onclick="copierLien()">Copier le lien</button><div class="lnote">Mets ce lien dans tes commentaires, ta bio, ton tunnel de vente.<br>Le prospect clique → répond aux questions → tu reçois son profil par email.</div></div>
        </div>
        <div id="tleads" style="display:none;"><div class="estats" id="estats"></div><div style="display:flex;justify-content:flex-end;margin-bottom:10px;"><button class="eexp" onclick="exportCSV()">↓ Exporter CSV</button></div><div class="etw"><table><thead><tr><th>Prénom</th><th>Email</th><th>Profil</th><th>Méfiance</th><th>Pays</th><th>Date</th></tr></thead><tbody id="etbody"></tbody></table></div></div>
      </div>
    </div>
    <div id="vue-p" style="display:${isProspectMode ? 'flex' : 'none'}">
      <div class="pcard">
        <div class="pprog"><div class="pprogf" id="pprogf"></div></div>
        <div class="pscreen on" id="psintro">
          <div class="pintro"><div class="ptag">Accès gratuit</div><h1 class="ptitle" id="ptitre">Réponds à quelques questions pour recevoir ton accès.</h1><p class="pdesc">Moins de 2 minutes.</p><div class="poffer"><div class="pofferlbl">Ce que tu reçois</div><div class="pofferrow"><div class="pdot"></div><span id="pcadeau">Ton accès gratuit</span></div><div class="pofferrow"><div class="pdot"></div><span>Accès immédiat après inscription</span></div></div><button class="pbtn" onclick="pStart()">Commencer →</button><p class="pnote">Gratuit · Sans engagement · 2 minutes</p></div>
        </div>
        <div class="pscreen" id="psquestions">
          <div class="pqblock"><div class="pqmeta"><div class="pqnum" id="pqnum"></div><div class="pqdots" id="pqdots"></div></div><div class="pqtxt" id="pqtxt"></div><div class="popts" id="popts"></div><div class="pnav"><button class="pbk" onclick="pPrev()">← Retour</button><button class="pnx" id="pnx" onclick="pNext()">Suivant →</button></div></div>
        </div>
        <div class="pscreen" id="psemail">
          <div class="peblock"><div class="peico">✉️</div><div class="petitle">Dernière étape.</div><p class="pesub" id="pesub">Entre ton prénom et ton email pour recevoir ton accès immédiatement.</p><input type="text" class="pfield" id="pprenom" placeholder="Ton prénom"/><input type="email" class="pfield" id="pemail" placeholder="Ton adresse email"/><button class="pbtn" id="btnSubmit" onclick="pSoumettre(event)">Recevoir l'accès →</button><p class="pprv">Pas de spam. Juste ton accès.</p></div>
        </div>
        <div class="pscreen" id="psconfirm">
          <div class="pconfirm"><div class="pcico">🎉</div><div class="pctitle" id="pctitle">Félicitations !</div><p class="pcsub" id="pcsub">Ton accès est prêt.</p><a class="pcbtn" id="pclien" href="#" target="_blank">Accéder maintenant →</a><p class="pcnote">Vérifie aussi tes emails si tu ne trouves pas l'accès.</p></div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('main-content').innerHTML = toolHTML;
  if(isProspectMode) {
    const config = JSON.parse(localStorage.getItem("mt_config") || "{}");
    if(config.titre) document.getElementById("ptitre").innerText = config.titre;
    if(config.cadeau) document.getElementById("pcadeau").innerText = config.cadeau;
    if(config.lien) document.getElementById("pclien").href = config.lien;
  } else {
    loadConfig();
  }
}

window.onload = function() {
  if (isProspect) {
    document.getElementById('key-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    initOutil(true);
  }
};
</script>
</body>
