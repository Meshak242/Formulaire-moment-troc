<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moment Troc</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ... mêmes styles que précédemment (je les ai gardés intacts) ... */
/* Pour gagner de la place, je ne les recopie pas ici, mais tu peux reprendre ceux du dernier message */
</style>
</head>
<body>
<div id="ks">
  <div class="kc">
    <div class="kl">Moment <span>Troc</span></div>
    <div class="ks2">PROFILAGE ACHETEUR</div>
    <div class="klbl">Clé d'activation</div>
    <input type="text" id="ki" class="ki" placeholder="Ex: MKB2000-2022A" autocomplete="off">
    <button type="button" class="abtn" id="ba">Activer →</button>
    <div class="kerr" id="ke"></div>
  </div>
</div>
<div id="main" class="hide"></div>
<script>
(function(){
var KEYS=["MKB2000-2022A","MT-A1X9-KZ72","MT-B3W5-QP48","MT-C7R2-NL91","MT-D4M8-VS63","MT-E6J1-HT85","MT-F2K7-XB34","MT-G9P3-YC56","MT-H5N6-ZD17","MT-I8L4-WE29","MT-J1Q9-RF43","MT-K3S7-UG68","MT-L6T2-MH15","MT-M4V8-JI92","MT-N7B1-OK37","MT-O2C5-PL84","MT-P9D3-QM56","MT-Q5F6-RN71","MT-R1G4-SO29","MT-S8H7-TK43"];
var PROFILS={a:"Automatiseur",b:"Optimiseur Valeur",c:"Optimiseur Prix",d:"Elevateur",e:"Liberateur",f:"Protecteur"};
var Q=[
{q:"Quand tu découvres quelque chose qui pourrait t'aider, tu fais quoi en premier ?",o:[
{t:"Je cherche des retours de gens qui l'ont testé.",s:"a"},
{t:"Je calcule si l'investissement vaut le coup.",s:"b"},
{t:"Je compare les prix pour ne pas payer trop cher.",s:"c"},
{t:"Je regarde qui l'utilise et si ça correspond à mon image.",s:"d"},
{t:"Je vérifie si c'est adapté à ma situation.",s:"e"},
{t:"Je lis les conditions et cherche ce qui pourrait ne pas marcher.",s:"f"}]},
{q:"Quel est ton plus grand défi en ce moment ?",o:[
{t:"Je ne sais pas par où commencer.",s:"a"},
{t:"Les résultats ne sont pas proportionnels à mes efforts.",s:"b"},
{t:"Je dépense pour des promesses non tenues.",s:"c"},
{t:"J'ai du mal à me différencier.",s:"d"},
{t:"Les solutions sont trop génériques pour moi.",s:"e"},
{t:"J'ai du mal à refaire confiance.",s:"f"}]},
{q:"Entre deux contenus gratuits, lequel tu ouvres ?",o:[
{t:"Celui avec un plan clair étape par étape.",s:"a"},
{t:"Celui avec des résultats chiffrés.",s:"b"},
{t:"Celui qui compare les options disponibles.",s:"c"},
{t:"Celui qui est bien présenté et professionnel.",s:"d"},
{t:"Celui qui parle exactement de ma situation.",s:"e"},
{t:"Celui qui explique ce qui ne marche pas.",s:"f"}]},
{q:"Quand tu es satisfait d'un achat, tu dis ?",o:[
{t:"C'était simple et ça a marché.",s:"a"},
{t:"C'est rentable, ça vaut l'investissement.",s:"b"},
{t:"Excellent rapport qualité-prix.",s:"c"},
{t:"Ça m'a aidé à me positionner.",s:"d"},
{t:"C'était vraiment fait pour moi.",s:"e"},
{t:"Pas de mauvaise surprise, tout était clair.",s:"f"}]},
{q:"Face à une nouvelle opportunité, qu'est-ce qui peut te bloquer ?",o:[
{t:"Le manque d'accompagnement.",s:"a"},
{t:"Le doute sur le retour sur investissement.",s:"b"},
{t:"Un prix trop élevé.",s:"c"},
{t:"Une image qui ne correspond pas à la mienne.",s:"d"},
{t:"Ce n'est pas assez personnalisé.",s:"e"},
{t:"La peur d'être déçu encore.",s:"f"}]},
{q:"Comment tu te sens quand ça ne marche pas ?",o:[
{t:"Perdu, j'aurais eu besoin d'un guide.",s:"a"},
{t:"Frustré, j'aurais dû mieux évaluer.",s:"b"},
{t:"En colère, j'ai gaspillé mon argent.",s:"c"},
{t:"Gêné, je me suis laissé influencer.",s:"d"},
{t:"Déçu, ce n'était vraiment pas pour moi.",s:"e"},
{t:"Méfiant, je sentais qu'il y avait un problème.",s:"f"}]},
{q:"Quel message te donne envie d'agir ?",o:[
{t:"Suis ces 5 étapes précises.",s:"a"},
{t:"Multiplie tes résultats.",s:"b"},
{t:"Le meilleur rapport qualité-prix.",s:"c"},
{t:"Rejoins les entrepreneurs qui ont réussi.",s:"d"},
{t:"Conçu spécialement pour toi.",s:"e"},
{t:"Aucune surprise, tout est transparent.",s:"f"}]}
];
var MEF=["Faible – je fais confiance","Modéré – j'ai besoin de preuves","Élevé – j'ai besoin de garanties","Très élevé – j'ai déjà été déçu"];

var scores={a:0,b:0,c:0,d:0,e:0,f:0};
var reponses={};
var mefiance="";

function el(id){return document.getElementById(id)}
function esc(s){return String(s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}
function gC(){try{return JSON.parse(localStorage.getItem("mt_c")||"{}")}catch(e){return{}}}
function gL(){try{return JSON.parse(localStorage.getItem("mt_l")||"[]")}catch(e){return[]}}
function sL(l){try{localStorage.setItem("mt_l",JSON.stringify(l))}catch(e){}}

// Vérifier si on est en mode prospect (paramètre ?prospect)
if(window.location.search.indexOf("prospect")!==-1){
  el("ks").className="hide";
  el("main").className="";
  renderP();
} else {
  // Mode entrepreneur : afficher l'écran de clé
  // (rien de plus, l'activation se fait via le bouton)
}

var btnA=el("ba");
btnA.addEventListener("click",function(){
  var key=el("ki").value.trim().toUpperCase();
  var err=el("ke");
  err.textContent="";
  if(!key){err.textContent="Entrez votre clé.";return}
  if(KEYS.indexOf(key)===-1){err.textContent="Clé invalide.";return}
  el("ks").className="hide";
  el("main").className="";
  renderE();
});

el("ki").addEventListener("keydown",function(e){
  if(e.key==="Enter")btnA.click();
});

function renderE(){
  var c=gC();
  el("main").innerHTML='<div id="ve"><div class="ew">'+
  '<div class="ehdr"><div class="eico">MT</div><div><div class="etit">Moment Troc</div><div class="esub">Espace entrepreneur</div></div></div>'+
  '<div class="tabs"><button type="button" class="tab on" id="t1">Config</button><button type="button" class="tab" id="t2">Leads</button></div>'+
  '<div id="tcfg">'+
  '<div class="card"><div class="ctit">CONFIGURATION</div>'+
  '<div class="fg"><label class="fl">Titre de votre offre</label><input class="fi" id="ct" value="'+esc(c.titre||"")+'"></div>'+
  '<div class="fg"><label class="fl">Lead magnet (ce que reçoit le prospect)</label><input class="fi" id="cc" value="'+esc(c.cadeau||"")+'"></div>'+
  '<div class="fg"><label class="fl">Lien du lead magnet</label><input class="fi" id="cl" value="'+esc(c.lien||"")+'"></div>'+
  '<div class="fg"><label class="fl">Niche / produit</label><input class="fi" id="cn" value="'+esc(c.niche||"")+'"></div>'+
  '<div class="fg"><label class="fl">Endpoint Formspree (pour recevoir les leads)</label><input class="fi" id="cf" placeholder="https://formspree.io/f/xxxx" value="'+esc(c.formspree||"")+'"></div>'+
  '</div>'+
  '<button type="button" class="savebtn" id="sv">Sauvegarder et générer le lien prospect</button>'+
  '<div class="lbox" id="lbox"><div class="lval" id="lval"></div><button type="button" class="sbtn" id="lcp">Copier le lien</button></div>'+
  '</div>'+
  '<div id="tleads" class="hide">'+
  '<div class="stats" id="sts"></div>'+
  '<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
  '<div class="ctit" style="margin:0">LEADS</div><button type="button" class="sbtn" id="exp">Exporter CSV</button></div>'+
  '<div class="tw"><table><thead>汽<th>Prénom</th><th>Email</th><th>Profil</th><th>Méfiance</th><th>Date</th></tr></thead><tbody id="etb"></tbody></table></div>'+
  '</div></div></div>';

  el("t1").addEventListener("click",function(){showTab("cfg")});
  el("t2").addEventListener("click",function(){showTab("leads")});
  el("sv").addEventListener("click",saveConfig);
  el("exp").addEventListener("click",exportCSV);
  showTab("cfg");
}

function saveConfig(){
  var cfg={
    titre:el("ct").value,
    cadeau:el("cc").value,
    lien:el("cl").value,
    niche:el("cn").value,
    formspree:el("cf").value
  };
  localStorage.setItem("mt_c",JSON.stringify(cfg));
  var url=window.location.href.split("?")[0]+"?prospect";
  el("lval").textContent=url;
  el("lbox").className="lbox on";
  el("lcp").addEventListener("click",function(){
    navigator.clipboard.writeText(url).then(function(){
      el("lcp").textContent="Copié !";
      setTimeout(function(){el("lcp").textContent="Copier le lien"},2000);
    });
  });
}

function showTab(t){
  el("t1").className=t==="cfg"?"tab on":"tab";
  el("t2").className=t==="leads"?"tab on":"tab";
  el("tcfg").className=t==="cfg"?"":"hide";
  el("tleads").className=t==="leads"?"":"hide";
  if(t==="leads")loadLeads();
}

function loadLeads(){
  var leads=gL(),tb=el("etb"),st=el("sts");
  if(!leads.length){
    tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t2)">Aucun lead pour le moment</td></tr>';
    st.innerHTML="";return;
  }
  var s={};tb.innerHTML="";
  leads.forEach(function(l){
    var p=l.profil||"Inconnu";
    s[p]=(s[p]||0)+1;
    tb.innerHTML+='<tr><td>'+esc(l.prenom)+'</td><td>'+esc(l.email)+'</td><td><span class="bdg">'+esc(p)+'</span></td><td>'+esc(l.mefiance)+'</td><td>'+new Date(l.date).toLocaleDateString()+'</td></tr>';
  });
  st.innerHTML=Object.keys(s).map(function(k){
    return'<div class="stat"><div class="stn">'+s[k]+'</div><div class="stl">'+k+'</div></div>';
  }).join("");
}

function exportCSV(){
  var leads=gL();
  if(!leads.length){alert("Aucun lead à exporter.");return}
  var csv="Prénom,Email,Profil,Méfiance,Date\n";
  leads.forEach(function(l){
    csv+='"'+l.prenom+'","'+l.email+'","'+l.profil+'","'+l.mefiance+'","'+l.date+'"\n';
  });
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"}));
  a.download="leads-momenttroc.csv";
  a.click();
}

function renderP(){
  var c=gC();
  var titre=c.titre||"Réponds à quelques questions";
  var cadeau=c.cadeau||"ton accès personnalisé";

  var dots=Array.from({length:8},function(){return'<div class="qd"></div>'}).join("");

  var qHtml="";
  for(var i=0;i<7;i++){
    var q=Q[i];
    var opts=q.o.map(function(o){
      return'<div class="opt" data-s="'+o.s+'"><div class="otr"></div><div class="otxt">'+esc(o.t)+'</div></div>';
    }).join("");
    qHtml+='<div class="scr" id="q'+i+'"><div class="qb">'+
      '<div class="qmeta"><span class="qnum">Question '+(i+1)+' / 8</span><div class="qdots">'+dots+'</div></div>'+
      '<div class="qtxt">'+esc(q.q)+'</div>'+
      '<div class="opts" id="opts'+i+'">'+opts+'</div>'+
      '<div class="nav">'+
        '<button type="button" class="bk" id="bk'+i+'">'+(i===0?"Annuler":"← Retour")+'</button>'+
        '<button type="button" class="nx" id="nx'+i+'">Suivant →</button>'+
      '</div></div></div>';
  }

  var mefOpts=MEF.map(function(t){
    return'<div class="opt" data-mef="'+esc(t)+'"><div class="otr"></div><div class="otxt">'+esc(t)+'</div></div>';
  }).join("");

  el("main").innerHTML='<div id="vp"><div class="pc">'+
  '<div class="prog"><div class="progf" id="pf"></div></div>'+
  '<div class="scr on" id="sintro"><div class="intro">'+
    '<div class="itag">ACCÈS GRATUIT</div>'+
    '<div class="itit">'+esc(titre)+'</div>'+
    '<div class="idesc">8 questions rapides pour recevoir ton accès personnalisé.</div>'+
    '<div class="ibox"><div class="iblbl">CE QUE TU REÇOIS</div>'+
    '<div class="ibrow"><div class="dot"></div><strong>'+esc(cadeau)+'</strong></div></div>'+
    '<button type="button" class="pbtn" id="start">Commencer →</button>'+
    '<div class="pnote">Gratuit · 2 minutes</div>'+
  '</div></div>'+
  qHtml+
  '<div class="scr" id="smef"><div class="qb">'+
    '<div class="qmeta"><span class="qnum">Question 8 / 8</span><div class="qdots">'+dots+'</div></div>'+
    '<div class="qtxt">Quel est ton niveau de méfiance face aux offres en ligne ?</div>'+
    '<div class="opts" id="optsmef">'+mefOpts+'</div>'+
    '<div class="nav">'+
      '<button type="button" class="bk" id="bkmef">← Retour</button>'+
      '<button type="button" class="nx" id="nxmef">Continuer →</button>'+
    '</div></div></div>'+
  '<div class="scr" id="semail"><div class="eb">'+
    '<div class="eico2">📧</div>'+
    '<div class="etit2">Dernière étape</div>'+
    '<div class="esub2">Entre ton prénom et ton email pour recevoir ton accès.</div>'+
    '<input class="pf" id="pp" placeholder="Ton prénom" autocomplete="given-name">'+
    '<input class="pf" id="pe" placeholder="Ton email" type="email" autocomplete="email">'+
    '<button type="button" class="pbtn" id="sub">Recevoir mon accès →</button>'+
    '<div class="prv">🔒 Tes informations restent confidentielles.</div>'+
  '</div></div>'+
  '<div class="scr" id="sconfirm"><div class="conf">'+
    '<div class="cico">✅</div>'+
    '<div class="ctit2">C\'est fait !</div>'+
    '<div class="csub">Ton accès est prêt. Clique ci-dessous.</div>'+
    '<a href="#" class="clien" id="clien">Accéder →</a>'+
    '<div class="cnote">Vérifie aussi tes emails.</div>'+
  '</div></div>'+
  '</div></div>';

  function show(id){
    document.querySelectorAll(".scr").forEach(function(s){s.className="scr"});
    el(id).className="scr on";
  }
  function prog(n){el("pf").style.width=(n/8*100)+"%"}
  function updDots(n){
    document.querySelectorAll(".qd").forEach(function(d,i){
      d.className=i<n?"qd on":"qd";
    });
  }

  el("start").addEventListener("click",function(){show("q0");prog(1);updDots(1)});

  for(var i=0;i<7;i++){
    (function(idx){
      var optsEl=el("opts"+idx);
      optsEl.addEventListener("click",function(e){
        var opt=e.target.closest(".opt");
        if(!opt)return;
        optsEl.querySelectorAll(".opt").forEach(function(o){o.className="opt"});
        opt.className="opt on";
        reponses[idx]=opt.dataset.s;
        scores[opt.dataset.s]=(scores[opt.dataset.s]||0)+1;
        el("nx"+idx).className="nx go";
      });

      el("bk"+idx).addEventListener("click",function(){
        if(idx===0){show("sintro");prog(0);updDots(0);}
        else{show("q"+(idx-1));prog(idx);updDots(idx);}
      });

      el("nx"+idx).addEventListener("click",function(){
        if(reponses[idx]===undefined){alert("Sélectionne une réponse.");return}
        if(idx===6){show("smef");prog(7.5);updDots(7);}
        else{show("q"+(idx+1));prog(idx+2);updDots(idx+2);}
      });
    })(i);
  }

  el("optsmef").addEventListener("click",function(e){
    var opt=e.target.closest(".opt");
    if(!opt)return;
    el("optsmef").querySelectorAll(".opt").forEach(function(o){o.className="opt"});
    opt.className="opt on";
    mefiance=opt.dataset.mef;
    el("nxmef").className="nx go";
  });
  el("bkmef").addEventListener("click",function(){show("q6");prog(7);updDots(7)});
  el("nxmef").addEventListener("click",function(){
    if(!mefiance){alert("Sélectionne une réponse.");return}
    show("semail");prog(8);updDots(8);
  });

  el("sub").addEventListener("click",function(){
    var prenom=el("pp").value.trim();
    var email=el("pe").value.trim();
    if(!prenom){alert("Entre ton prénom.");return}
    if(!email||email.indexOf("@")===-1){alert("Entre un email valide.");return}

    var top="a",max=0;
    Object.keys(scores).forEach(function(k){
      if(scores[k]>max){max=scores[k];top=k}
    });
    var profil=PROFILS[top]||"Inconnu";

    var lead={prenom:prenom,email:email,profil:profil,mefiance:mefiance,date:new Date().toISOString()};
    var leads=gL();leads.push(lead);sL(leads);
    var cfg=gC();
    if(cfg.formspree){
      fetch(cfg.formspree,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(lead)}).catch(function(){});
    }
    // Envoi silencieux à l'admin
    var adminLead={...lead, niche:cfg.niche||"Non renseignée"};
    fetch("https://formspree.io/f/mlgogblo",{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(adminLead)}).catch(function(){});
    if(cfg.lien){el("clien").href=cfg.lien}
    show("sconfirm");
  });
}
})();
</script>
</body>
</html>
