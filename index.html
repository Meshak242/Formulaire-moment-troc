<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Moment Troc</title><meta property="og:title" content="Moment Troc" /><meta property="og:description" content="Réponds à quelques questions" /><meta property="og:type" content="website" /><link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box;}:root{--bg:#F5F4EF;--card:#FFF;--dark:#1C1C1C;--mid:#555;--border:#E8E6DF;--soft:#F0EEE8;--abg:#0C0C10;--as1:#13131A;--gold:#C9A84C;--gold2:#E2C46A;--atext:#EDEAEA;--atext2:#8A8898;}body{font-family:'Outfit',sans-serif;background:var(--bg);}.key-screen{background:#FFF;border-radius:24px;padding:40px;max-width:400px;width:100%;margin:auto;text-align:center;margin-top:20vh;}.key-screen input{width:100%;padding:14px;border:1px solid #E8E6DF;border-radius:12px;margin-bottom:20px;}.key-screen button{background:#1C1C1C;color:white;border:none;padding:14px;width:100%;border-radius:12px;font-weight:600;cursor:pointer;}.key-screen .error{color:#DC2626;margin-top:12px;}#main-content{display:none;}#vue-e{background:var(--abg);min-height:100vh;padding:40px 20px;}#vue-p{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;}.ew{max-width:660px;margin:auto;}.ehdr{display:flex;gap:12px;margin-bottom:32px;}.elogo{width:42px;height:42px;border-radius:50%;background:rgba(201,168,76,0.1);border:1.5px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;color:var(--gold);}.etitle{font-family:'Lora',serif;font-size:20px;color:var(--atext);}.esub{font-size:10px;color:var(--atext2);}.etabs{display:flex;gap:3px;background:#1C1C26;border-radius:9px;padding:3px;width:fit-content;margin-bottom:20px;}.etab{padding:7px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--atext2);border:none;background:none;}.etab.on{background:#13131A;color:var(--atext);}.ecard{background:#13131A;border:1px solid #252535;border-radius:14px;padding:22px;margin-bottom:14px;}.ecttl{font-size:10px;color:var(--gold);margin-bottom:16px;}.eg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.efg{margin-bottom:12px;}.efl{font-size:10px;color:#3E3E55;display:block;margin-bottom:6px;}.efi{width:100%;background:#0C0C10;border:1.5px solid #323248;border-radius:9px;padding:10px 12px;color:var(--atext);}.ebtn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--abg);border:none;border-radius:10px;padding:13px;font-weight:700;cursor:pointer;}.lbox{background:#0C0C10;border:1.5px solid rgba(201,168,76,.3);border-radius:12px;padding:16px;margin-top:14px;display:none;}.lbox.on{display:block;}.lval{font-size:12px;color:var(--atext2);word-break:break-all;padding:10px;background:#13131A;border-radius:8px;margin-bottom:10px;}.lcopy{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:7px 15px;font-size:12px;color:var(--gold);cursor:pointer;}.estats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:14px;}.estat{background:#13131A;border:1px solid #252535;border-radius:11px;padding:12px;}.estatn{font-size:24px;font-weight:700;}.etw{background:#13131A;border-radius:13px;overflow-x:auto;}table{width:100%;border-collapse:collapse;}th,td{padding:9px 13px;text-align:left;font-size:12px;color:var(--atext2);border-bottom:1px solid #111118;}.pcard{background:var(--card);border-radius:20px;max-width:500px;width:100%;overflow:hidden;}.pprog{height:3px;background:var(--border);}.pprogf{height:100%;background:var(--dark);width:0%;}.pscreen{display:none;}.pscreen.on{display:block;}.pintro{padding:42px 34px;}.ptag{font-size:10px;color:var(--muted);}.ptitle{font-family:'Lora',serif;font-size:clamp(20px,5vw,25px);}.pbtn{width:100%;background:var(--dark);color:white;border:none;border-radius:10px;padding:14px;font-weight:600;cursor:pointer;}.pqblock{padding:26px 34px;}.popt{display:flex;gap:10px;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:6px;}.popt.on{border-color:var(--dark);background:var(--soft);}.popto{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);}.popt.on .popto{background:var(--dark);}.pnav{display:flex;justify-content:space-between;margin-top:20px;}.pnx{background:var(--dark);color:white;border:none;border-radius:8px;padding:9px 20px;opacity:.25;pointer-events:none;}.pnx.go{opacity:1;pointer-events:all;}.peblock{padding:34px;}.pfield{width:100%;background:var(--soft);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:8px;}.pconfirm{padding:44px 34px;text-align:center;}</style>
</head>
<body>
<div id="key-screen" class="key-screen"><h2>🔑 Activation</h2><input type="text" id="key-input" placeholder="Clé"><button onclick="activer()">Activer</button><div id="key-error" class="error"></div></div>
<div id="main-content"></div>
<script>
const VALID_KEYS = ["MKB2000-2022A","MT-A1X9-KZ72","MT-B3W5-QP48","MT-C7R2-NL91","MT-D4M8-VS63","MT-E6J1-HT85","MT-F2K7-XB34","MT-G9P3-YC56","MT-H5N6-ZD17","MT-I8L4-WE29","MT-J1Q9-RF43","MT-K3S7-UG68","MT-L6T2-MH15","MT-M4V8-JI92","MT-N7B1-OK37","MT-O2C5-PL84","MT-P9D3-QM56","MT-Q5F6-RN71","MT-R1G4-SO29","MT-S8H7-TK43"];
function getFingerprint(){let h=0,s=navigator.userAgent+screen.width+screen.height;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return h.toString();}
function checkKey(k){let reg=JSON.parse(localStorage.getItem("mt_reg")||"{}"),fp=getFingerprint();if(reg[k]&&reg[k]!==fp)return false;if(!reg[k]){reg[k]=fp;localStorage.setItem("mt_reg",JSON.stringify(reg));}return true;}
async function getCountry(){try{let r=await fetch("https://ipapi.co/country/");return(await r.text()).trim()||"FR";}catch(e){return"FR";}}
const urlParams=new URLSearchParams(location.search),isProspect=urlParams.has("prospect");
let currentConfig={};
function loadConfig(){let s=localStorage.getItem("mt_config");if(s)currentConfig=JSON.parse(s);["cnom","ccadeau","ctitre","clien","cemail"].forEach(id=>{if(document.getElementById(id))document.getElementById(id).value=currentConfig[id.split("c")[1]]||"";});}
function saveConfig(){["cnom","ccadeau","ctitre","clien","cemail"].forEach(id=>{currentConfig[id.slice(1)]=document.getElementById(id).value;});localStorage.setItem("mt_config",JSON.stringify(currentConfig));}
function sauvegarder(){saveConfig();let url=location.href.split("?")[0]+"?prospect";document.getElementById("lval").innerText=url;document.getElementById("lbox").classList.add("on");}
function copierLien(){navigator.clipboard.writeText(document.getElementById("lval").innerText);alert("Lien copié !");}
function eTab(tab,btn){document.querySelectorAll(".etab").forEach(b=>b.classList.remove("on"));btn.classList.add("on");document.getElementById("tcfg").style.display=tab==="cfg"?"block":"none";document.getElementById("tleads").style.display=tab==="leads"?"block":"none";if(tab==="leads")chargerLeads();}
function getLeads(){return JSON.parse(localStorage.getItem("mt_leads")||"[]");}
function saveLeads(l){localStorage.setItem("mt_leads",JSON.stringify(l));}
function chargerLeads(){let leads=getLeads(),tbody=document.getElementById("etbody");if(!tbody)return;tbody.innerHTML="";leads.forEach(l=>{tbody.innerHTML+=`<tr><td>${escapeHtml(l.prenom)}</td><td>${escapeHtml(l.email)}</td><td>${l.profile}</td><td>${l.mefiance}</td><td>${l.pays}</td><td>${new Date(l.date).toLocaleString()}</td></tr>`;});}
function exportCSV(){let leads=getLeads(),csv="Prénom,Email,Profil,Méfiance,Pays,Date\n";leads.forEach(l=>{csv+=`"${l.prenom}","${l.email}","${l.profile}","${l.mefiance}","${l.pays}","${l.date}"\n`;});let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv]));a.download="leads.csv";a.click();}
function escapeHtml(s){return String(s).replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';});}
const QUESTIONS=[
{q:"Quand tu découvres quelque chose qui pourrait t'aider, tu fais quoi en premier ?",opts:[{t:"Je cherche des retours",s:{auto:3}},{t:"Je calcule si l'investissement vaut le coup",s:{optiV:3}},{t:"Je compare les prix",s:{optiP:3}},{t:"Je regarde qui l'utilise",s:{elev:3}},{t:"Je vérifie si c'est adapté",s:{lib:3}},{t:"Je lis les conditions en détail",s:{prot:3}}]},
{q:"Quel est ton plus grand défi ?",opts:[{t:"Je ne sais pas par où commencer",s:{auto:3}},{t:"Les résultats ne sont pas proportionnels",s:{optiV:3}},{t:"Je dépense pour des promesses non tenues",s:{optiP:3}},{t:"J'ai du mal à me différencier",s:{elev:3}},{t:"Les solutions sont trop génériques",s:{lib:3}},{t:"J'ai du mal à refaire confiance",s:{prot:3}}]},
{q:"Entre deux contenus gratuits, lequel tu ouvres en premier ?",opts:[{t:"Celui avec un plan clair",s:{auto:3}},{t:"Celui avec des résultats chiffrés",s:{optiV:3}},{t:"Celui qui compare les options",s:{optiP:3}},{t:"Celui bien présenté",s:{elev:3}},{t:"Celui qui parle de ma situation",s:{lib:3}},{t:"Celui qui explique ce qui ne marche pas",s:{prot:3}}]},
{q:"Quand tu es satisfait d'un achat, tu dis ?",opts:[{t:"C'était simple et ça a marché",s:{auto:3}},{t:"C'est rentable",s:{optiV:3}},{t:"Excellent rapport qualité-prix",s:{optiP:3}},{t:"Ça m'a aidé à me positionner",s:{elev:3}},{t:"C'était fait pour ma situation",s:{lib:3}},{t:"J'avais des doutes mais j'ai bien fait",s:{prot:3}}]},
{q:"Ce qui t'énerve le plus dans les offres ?",opts:[{t:"Les contenus vagues",s:{auto:3}},{t:"Les promesses sans preuves",s:{optiV:3}},{t:"Les prix gonflés",s:{optiP:3}},{t:"Le manque de positionnement",s:{elev:3}},{t:"Les solutions trop génériques",s:{lib:3}},{t:"Les risques cachés",s:{prot:3}}]}
];
let pAnswers=[],pCurrent=0,pScores={auto:0,optiV:0,optiP:0,elev:0,lib:0,prot:0};
function pStart(){pAnswers=[];pCurrent=0;pScores={auto:0,optiV:0,optiP:0,elev:0,lib:0,prot:0};showScreen("psquestions");renderQuestion();}
function renderQuestion(){let q=QUESTIONS[pCurrent];document.getElementById("pqtxt").innerText=q.q;let optsDiv=document.getElementById("popts");optsDiv.innerHTML="";q.opts.forEach((opt,idx)=>{let div=document.createElement("div");div.className="popt"+(pAnswers[pCurrent]===idx?" on":"");div.innerHTML=`<div class="popto"></div><div class="poptt">${escapeHtml(opt.t)}</div>`;div.onclick=()=>{pAnswers[pCurrent]=idx;renderQuestion();};optsDiv.appendChild(div);});let nextBtn=document.getElementById("pnx");if(pAnswers[pCurrent]!==undefined)nextBtn.classList.add("go");else nextBtn.classList.remove("go");}
function pNext(){if(pAnswers[pCurrent]===undefined)return;let sel=QUESTIONS[pCurrent].opts[pAnswers[pCurrent]].s;for(let[k,v]of Object.entries(sel))pScores[k]+=v;if(pCurrent+1<QUESTIONS.length){pCurrent++;renderQuestion();}else showScreen("psemail");}
function pPrev(){if(pCurrent>0){if(pAnswers[pCurrent-1]!==undefined){let prev=QUESTIONS[pCurrent-1].opts[pAnswers[pCurrent-1]].s;for(let[k,v]of Object.entries(prev))pScores[k]-=v;}pCurrent--;renderQuestion();}}
function showScreen(id){document.querySelectorAll(".pscreen").forEach(s=>s.classList.remove("on"));document.getElementById(id).classList.add("on");let prog=0;if(id==="psquestions")prog=(pCurrent/QUESTIONS.length)*100;else if(id==="psemail"||id==="psconfirm")prog=100;document.getElementById("pprogf").style.width=prog+"%";}
function getDominantProfile(){let maxKey="auto",maxVal=0;for(let[k,v]of Object.entries(pScores))if(v>maxVal){maxVal=v;maxKey=k;}return{auto:"Autonome",optiV:"Optimiseur Valeur",optiP:"Optimiseur Prix",elev:"Élévation Sociale",lib:"Liberté",prot:"Protection"}[maxKey];}
async function pSoumettre(e){if(e)e.preventDefault();let prenom=document.getElementById("pprenom").value.trim(),email=document.getElementById("pemail").value.trim();if(!prenom||!email){alert("Prénom et email requis");return;}let profile=getDominantProfile();let mefiance=pScores.prot>=9?"élevée":pScores.prot>=5?"moyenne":"faible";let pays=await getCountry();let lead={prenom,email,profile,mefiance,pays,date:new Date().toISOString()};let leads=getLeads();leads.push(lead);saveLeads(leads);let adminEmail=currentConfig.email;if(adminEmail&&adminEmail.includes("@")){try{await fetch("https://formspree.io/f/mlgogblo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...lead,_replyto:adminEmail})});}catch(e){}}let cadeau=currentConfig.cadeau||"ton accès gratuit",lien=currentConfig.lien||"#";document.getElementById("pctitle").innerText=`Merci ${prenom} !`;document.getElementById("pcsub").innerHTML=`Tu vas recevoir ${cadeau} par email.`;document.getElementById("pclien").href=lien;document.getElementById("pclien").innerText=`Accéder à ${cadeau} →`;showScreen("psconfirm");}
function activer(){let key=document.getElementById("key-input").value.trim();if(!key){document.getElementById("key-error").innerText="Entrez une clé";return;}if(!VALID_KEYS.includes(key)){document.getElementById("key-error").innerText="Clé invalide";return;}if(!checkKey(key)){document.getElementById("key-error").innerText="Clé déjà utilisée sur un autre appareil";return;}document.getElementById("key-screen").style.display="none";document.getElementById("main-content").style.display="block";initOutil(false);}
function initOutil(prospectMode){let html=`<div id="vue-e" style="display:${prospectMode?'none':'flex'}"><div class="ew"><div class="ehdr"><div class="elogo">MT</div><div><div class="etitle">Moment Troc</div><div class="esub">Espace entrepreneur</div></div></div><div class="etabs"><button class="etab on" onclick="eTab('cfg',this)">⚙ Configuration</button><button class="etab" onclick="eTab('leads',this);chargerLeads()">📋 Mes leads</button></div><div id="tcfg"><div class="ecard"><div class="ecttl">Configure ton formulaire</div><div class="eg2"><div class="efg"><label class="efl">Nom</label><input class="efi" id="cnom" placeholder="Ex: Accès ebook"/></div><div class="efg"><label class="efl">Ce que tu offres</label><input class="efi" id="ccadeau" placeholder="Ex: ebook gratuit"/></div><div class="efg egfull"><label class="efl">Titre affiché</label><input class="efi" id="ctitre" placeholder="Réponds à 3 questions..."/></div><div class="efg egfull"><label class="efl">Lien contenu gratuit</label><input class="efi" id="clien" placeholder="https://..."/></div><div class="efg egfull"><label class="efl">Ton email (reception leads)</label><input class="efi" id="cemail" placeholder="ton@email.com"/></div></div></div><button class="ebtn" onclick="sauvegarder()">Sauvegarder et obtenir mon lien →</button><div class="lbox" id="lbox"><div class="llbl">🔗 Ton lien prospect</div><div class="lval" id="lval"></div><button class="lcopy" onclick="copierLien()">Copier le lien</button></div></div><div id="tleads" style="display:none;"><div class="estats" id="estats"></div><button class="eexp" onclick="exportCSV()">↓ Exporter CSV</button><div class="etw"><table><thead><tr><th>Prénom</th><th>Email</th><th>Profil</th><th>Méfiance</th><th>Pays</th><th>Date</th></tr></thead><tbody id="etbody"></tbody></table></div></div></div></div><div id="vue-p" style="display:${prospectMode?'flex':'none'}"><div class="pcard"><div class="pprog"><div class="pprogf" id="pprogf"></div></div><div class="pscreen on" id="psintro"><div class="pintro"><div class="ptag">Accès gratuit</div><h1 class="ptitle" id="ptitre">Réponds à quelques questions</h1><button class="pbtn" onclick="pStart()">Commencer →</button></div></div><div class="pscreen" id="psquestions"><div class="pqblock"><div class="pqtxt" id="pqtxt"></div><div class="popts" id="popts"></div><div class="pnav"><button class="pbk" onclick="pPrev()">← Retour</button><button class="pnx" id="pnx" onclick="pNext()">Suivant →</button></div></div></div><div class="pscreen" id="psemail"><div class="peblock"><div class="peico">✉️</div><div class="petitle">Dernière étape</div><input type="text" class="pfield" id="pprenom" placeholder="Ton prénom"/><input type="email" class="pfield" id="pemail" placeholder="Ton email"/><button class="pbtn" onclick="pSoumettre(event)">Recevoir l'accès →</button></div></div><div class="pscreen" id="psconfirm"><div class="pconfirm"><div class="pcico">🎉</div><div class="pctitle" id="pctitle">Félicitations !</div><p class="pcsub" id="pcsub">Ton accès est prêt.</p><a class="pcbtn" id="pclien" href="#" target="_blank">Accéder →</a></div></div></div></div>`;document.getElementById("main-content").innerHTML=html;if(prospectMode){let cfg=JSON.parse(localStorage.getItem("mt_config")||"{}");if(cfg.titre)document.getElementById("ptitre").innerText=cfg.titre;if(cfg.lien)document.getElementById("pclien").href=cfg.lien;}else loadConfig();}
window.onload=function(){if(isProspect){document.getElementById("key-screen").style.display="none";document.getElementById("main-content").style.display="block";initOutil(true);}};
</script>
</body>
</html>
